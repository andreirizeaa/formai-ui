name: DB Migrations (Prod only)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  migrate_prod:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Apply migrations to PROD
        run: |
          supabase db push --db-url "${{ secrets.PROD_DB_URL }}"
