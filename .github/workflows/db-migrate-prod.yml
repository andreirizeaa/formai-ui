name: DB Migrations (Prod only, gated)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  migrate_prod:
    runs-on: ubuntu-latest
    environment: prod   # approval gate + env-scoped secrets if you use them
    steps:
      - uses: actions/checkout@v4

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest   # optionally pin a version

      - name: Apply migrations to PROD
        run: |
          yes | supabase db push \
            --db-url "${{ secrets.PROD_DB_URL }}"
